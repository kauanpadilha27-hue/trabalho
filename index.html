<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Par ou Ímpar</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f2f2f2; padding: 20px; max-width: 400px; margin: 0 auto; }
        .cartao { background-color: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; width: 90%; }
        button { padding: 8px 15px; background-color: #005f73; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background-color: #0a9396; }
        .resultado { margin-top: 15px; font-weight: bold; color: #ae2012; text-align: center; }
    </style>
</head>
<body>
    <div class="cartao">
        <h2>Par ou Ímpar</h2>
        <input type="number" id="num" placeholder="Digite um número">
        <button onclick="verificar()">Verificar</button>
        <p class="resultado" id="res"></p>
    </div>

    <script>
        function verificar() {
            let numero = Number(document.getElementById('num').value);
            if (numero % 2 === 0) {
                document.getElementById('res').innerText = "O número " + numero + " é Par.";
            } else {
                document.getElementById('res').innerText = "O número " + numero + " é Ímpar.";
            }
        }
    </script>
</body>
</html>
